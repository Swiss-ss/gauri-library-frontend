<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gauri Library | Access Gateway</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* Premium Aesthetics & Smooth Animations */
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f6f3ee 0%, #ebe3d8 100%);
            position: relative;
            overflow-x: hidden;
        }

        /* Glowing background circles for modern premium vibe */
        .glow-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.55;
            pointer-events: none;
        }
        .glow-1 {
            width: 350px;
            height: 350px;
            background: #f26f3c;
            top: -50px;
            right: -100px;
        }
        .glow-2 {
            width: 400px;
            height: 400px;
            background: #f5f79d;
            bottom: -100px;
            left: -150px;
        }

        .auth-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 40px 20px;
        }

        .premium-auth-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 3px solid #122244;
            border-radius: 32px;
            box-shadow: 8px 8px 0px #122244;
            padding: 45px 35px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .premium-auth-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 10px 10px 0px #122244;
        }

        .brand-badge {
            background-color: #f26f3c;
            color: #ffffff;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 6px 16px;
            border-radius: 50px;
            border: 2px solid #122244;
            display: inline-block;
            margin-bottom: 25px;
            box-shadow: 2px 2px 0px #122244;
        }

        .headline {
            font-size: 32px;
            font-weight: 900;
            color: #122244;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        .subheadline {
            font-size: 15px;
            color: #4b5563;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .navbar-brutal {
            background-color: rgba(235, 227, 216, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .auth-input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 18px;
            text-align: left;
        }
        .auth-input-group label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .auth-input-group input {
            border: var(--border-thick);
            padding: 12px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 12px;
            background-color: var(--bg-canvas);
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        .auth-input-group input:focus {
            background-color: #ffffff;
            box-shadow: 3px 3px 0px var(--text-dark);
        }
    </style>
</head>
<body>

    <!-- Ambient Glowing Graphics -->
    <div class="glow-circle glow-1"></div>
    <div class="glow-circle glow-2"></div>

    <nav class="navbar-brutal" style="position: relative; z-index: 10;">
        <div class="logo-box">
            <img src="assets/Gauri Library.png" alt="Gauri Library Logo" class="logo-image">
            <div class="logo-text" style="font-family: 'Outfit', sans-serif;">Gauri Library Portal</div>
        </div>
        <div class="nav-links">
            <a href="index.html">← Back to Homepage</a>
        </div>
    </nav>

    <main class="auth-wrapper">
        <div class="premium-auth-card">
            <span class="brand-badge">Gmail Security System</span>
            <h1 class="headline">Enter Study Room</h1>
            <p class="subheadline" id="auth-subheadline">Enter your Gmail address below. We will dispatch a 6-digit login verification code to your inbox.</p>

            <!-- Step 1: Send OTP -->
            <form id="otp-request-action-form" style="display: flex; flex-direction: column; gap: 5px; text-align: left;">
                <div class="auth-input-group">
                    <label>Gmail Address</label>
                    <input type="email" id="otp-email" placeholder="yourname@gmail.com" required>
                </div>
                <button type="submit" id="send-otp-btn" class="btn-black-pill" style="width: 100%; justify-content: center; margin-top: 5px; font-family: 'Outfit', sans-serif;">
                    Send Login Code ✉
                </button>
            </form>

            <!-- Step 2: Verify OTP (Hidden Initially) -->
            <form id="otp-verify-action-form" style="display: none; flex-direction: column; gap: 5px; text-align: left; margin-top: 20px; border-top: 2px dashed #cbd5e1; padding-top: 20px;">
                <div class="auth-input-group">
                    <label>Aspirant Full Name</label>
                    <input type="text" id="otp-name" placeholder="Verify profile name" required>
                </div>
                <div class="auth-input-group">
                    <label>6-Digit Verification Code</label>
                    <input type="text" id="otp-code" placeholder="••••••" maxlength="6" required style="text-align: center; letter-spacing: 5px; font-size: 18px; font-weight: 800;">
                </div>
                <button type="submit" id="verify-otp-btn" class="btn-black-pill" style="width: 100%; justify-content: center; margin-top: 5px; font-family: 'Outfit', sans-serif; background-color: var(--bg-accent-orange) !important;">
                    Verify & Access Workspace ➔
                </button>
            </form>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
