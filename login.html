<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gauri Library | Authentication Gateway</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .auth-container { max-width: 420px; margin: 60px auto; padding: 10px; }
        .auth-card { background-color: #ffffff; padding: 40px; border: var(--border-thick); box-shadow: var(--shadow-flat); border-radius: 24px; text-align: center; }
        .toggle-tabs { display: flex; gap: 10px; margin-bottom: 25px; background: var(--bg-canvas); padding: 6px; border-radius: 50px; border: 2px solid var(--text-dark); }
        .tab-btn { flex: 1; padding: 10px; font-weight: 800; font-size: 14px; border: none; background: transparent; cursor: pointer; border-radius: 50px; transition: all 0.1s ease; }
        .tab-btn.active { background-color: var(--text-dark); color: var(--bg-canvas); }
        .form-box { display: none; }
        .form-box.active { display: block; }
        .auth-input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; text-align: left; }
        .auth-input-group label { font-size: 13px; font-weight: 800; text-transform: uppercase; }
        .auth-input-group input { border: var(--border-thick); padding: 12px; font-size: 15px; font-weight: 700; border-radius: 12px; background-color: var(--bg-canvas); outline: none; }
        .auth-input-group input:focus { background-color: #ffffff; box-shadow: 3px 3px 0px var(--text-dark); }
    </style>
</head>
<body style="background-color: var(--bg-canvas);">

    <nav class="navbar-brutal">
        <div class="logo-box">
            <img src="assets/Gauri Library.png" alt="Gauri Library Logo" class="logo-image">
            <div class="logo-text">Gauri Library Portal</div>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <div class="badge-discount" style="margin-bottom: 15px;">Single Sign-On Gateway</div>
            
            <h2 style="font-size: 26px; font-weight: 900; margin-bottom: 10px;">Library Access</h2>
            <p style="font-size: 14px; margin-bottom: 25px; color: #555555; line-height: 1.5;">Authenticate using your Gmail account to manage study spaces.</p>

            <!-- Official Google SSO Button Integration (Rendered dynamically if valid Client ID is set) -->
            <div id="official-google-btn-wrapper" style="display: none; justify-content: center; margin-bottom: 20px;">
                <div id="g_id_onload"
                     data-client_id="1039401768407-dummyclientid.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleGoogleSignIn"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="pill"
                     data-theme="outline"
                     data-text="signin_with"
                     data-size="large"
                     data-logo_alignment="left">
                </div>
            </div>

            <!-- Custom Mock Google Sign-In Button (Used on localhost by default for zero-setup demo) -->
            <div id="custom-google-btn-wrapper" style="display: flex; justify-content: center; margin-bottom: 20px;">
                <button type="button" id="custom-google-signin-btn" class="google-btn" onclick="handleMockGoogleSignIn()">
                    <svg class="google-icon" viewBox="0 0 24 24">
                        <path fill="#EA4335" d="M12 5.04c1.7 0 3.2.6 4.4 1.7l3.3-3.3C17.7 1.5 15 0 12 0 7.3 0 3.3 2.7 1.3 6.6l3.9 3C6.2 6.8 8.9 5.04 12 5.04z"/>
                        <path fill="#4285F4" d="M23.5 12.3c0-.8-.1-1.6-.2-2.3H12v4.4h6.5c-.3 1.5-1.1 2.8-2.4 3.7l3.7 2.9c2.2-2 3.7-5 3.7-8.7z"/>
                        <path fill="#FBBC05" d="M5.2 14.8c-.2-.6-.3-1.3-.3-2s.1-1.4.3-2L1.3 7.8C.5 9.4 0 11.2 0 13s.5 3.6 1.3 5.2l3.9-3.2z"/>
                        <path fill="#34A853" d="M12 24c3.2 0 6-1.1 8-2.9l-3.7-2.9c-1.1.7-2.5 1.2-4.3 1.2-3.1 0-5.8-1.8-6.8-4.5l-3.9 3C3.3 21.3 7.3 24 12 24z"/>
                    </svg>
                    <span>Sign in with Google</span>
                </button>
            </div>

            <!-- Divider Line -->
            <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px;">
                <hr style="flex: 1; border: none; border-top: 2px solid var(--text-dark); opacity: 0.15;">
                <span style="font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 1px;">or use developer credentials</span>
                <hr style="flex: 1; border: none; border-top: 2px solid var(--text-dark); opacity: 0.15;">
            </div>

            <!-- Consolidated Form: Passwordless Gmail Login -->
            <form id="gmail-login-action-form">
                <div class="auth-input-group">
                    <label>Gmail Address</label>
                    <input type="email" id="gmail-login-email" placeholder="yourname@gmail.com" required>
                </div>
                <div class="auth-input-group">
                    <label>Aspirant Full Name</label>
                    <input type="text" id="gmail-login-name" placeholder="Enter Full Name" required>
                </div>
                <button type="submit" class="btn-black-pill" style="width: 100%; justify-content: center; margin-top: 10px;">Enter Gauri Library →</button>
            </form>
        </div>
    </main>

    <script>
        // No client-side tab switching needed. Main logic is routed directly through js/main.js
    </script>
    <script src="js/main.js"></script>
</body>
</html>
