<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gauri Library | Access Gateway</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* Premium Aesthetics & Smooth Animations */
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f6f3ee 0%, #ebe3d8 100%);
            position: relative;
            overflow-x: hidden;
        }

        /* Glowing background circles for modern premium vibe */
        .glow-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.55;
            pointer-events: none;
        }
        .glow-1 {
            width: 350px;
            height: 350px;
            background: #f26f3c;
            top: -50px;
            right: -100px;
        }
        .glow-2 {
            width: 400px;
            height: 400px;
            background: #f5f79d;
            bottom: -100px;
            left: -150px;
        }

        .auth-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 40px 20px;
        }

        .premium-auth-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 3px solid #122244;
            border-radius: 32px;
            box-shadow: 8px 8px 0px #122244;
            padding: 45px 35px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .premium-auth-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 10px 10px 0px #122244;
        }

        .brand-badge {
            background-color: #f26f3c;
            color: #ffffff;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 6px 16px;
            border-radius: 50px;
            border: 2px solid #122244;
            display: inline-block;
            margin-bottom: 25px;
            box-shadow: 2px 2px 0px #122244;
        }

        .headline {
            font-size: 32px;
            font-weight: 900;
            color: #122244;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        .subheadline {
            font-size: 15px;
            color: #4b5563;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .navbar-brutal {
            background-color: rgba(235, 227, 216, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .auth-input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 18px;
            text-align: left;
        }
        .auth-input-group label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .auth-input-group input {
            border: var(--border-thick);
            padding: 12px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 12px;
            background-color: var(--bg-canvas);
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        .auth-input-group input:focus {
            background-color: #ffffff;
            box-shadow: 3px 3px 0px var(--text-dark);
        }
    </style>
</head>
<body>

    <!-- Ambient Glowing Graphics -->
    <div class="glow-circle glow-1"></div>
    <div class="glow-circle glow-2"></div>

    <nav class="navbar-brutal" style="position: relative; z-index: 10;">
        <div class="logo-box">
            <img src="assets/Gauri Library.png" alt="Gauri Library Logo" class="logo-image">
            <div class="logo-text" style="font-family: 'Outfit', sans-serif;">Gauri Library Portal</div>
        </div>
        <div class="nav-links">
            <a href="index.html">← Back to Homepage</a>
        </div>
    </nav>

    <main class="auth-wrapper">
        <div class="premium-auth-card">
            <span class="brand-badge">Google Secure Login</span>
            <h1 class="headline">Enter Study Room</h1>
            <p class="subheadline" id="auth-subheadline">Access the Gauri Library reservation portal using your Google Account.</p>

            <!-- Google Sign-In Button Container -->
            <div id="google-signin-btn-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 10px 0 25px 0; min-height: 50px; width: 100%;">
                <div id="google-signin-btn" style="width: 100%; display: flex; justify-content: center;"></div>
            </div>
            
            <p style="font-size: 12px; color: #64748b; line-height: 1.5; margin: 0;">
                🔒 Secure sign-in powered by Google Identity Services.<br>
                Your data is encrypted and kept private.
            </p>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
