<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gauri Library | Authentication Gateway</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container { max-width: 420px; margin: 60px auto; padding: 10px; }
        .auth-card { background-color: #ffffff; padding: 40px; border: var(--border-thick); box-shadow: var(--shadow-flat); border-radius: 24px; text-align: center; }
        .toggle-tabs { display: flex; gap: 10px; margin-bottom: 25px; background: var(--bg-canvas); padding: 6px; border-radius: 50px; border: 2px solid var(--text-dark); }
        .tab-btn { flex: 1; padding: 10px; font-weight: 800; font-size: 14px; border: none; background: transparent; cursor: pointer; border-radius: 50px; transition: all 0.1s ease; }
        .tab-btn.active { background-color: var(--text-dark); color: var(--bg-canvas); }
        .form-box { display: none; }
        .form-box.active { display: block; }
        .auth-input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; text-align: left; }
        .auth-input-group label { font-size: 13px; font-weight: 800; text-transform: uppercase; }
        .auth-input-group input { border: var(--border-thick); padding: 12px; font-size: 15px; font-weight: 700; border-radius: 12px; background-color: var(--bg-canvas); outline: none; }
        .auth-input-group input:focus { background-color: #ffffff; box-shadow: 3px 3px 0px var(--text-dark); }
    </style>
</head>
<body style="background-color: var(--bg-canvas);">

    <nav class="navbar-brutal">
        <div class="logo-box">
            <img src="assets/Gauri Library.png" alt="Gauri Library Logo" class="logo-image">
            <div class="logo-text">Gauri Library Portal</div>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <div class="badge-discount" style="margin-bottom: 15px;">Gateway Security System</div>
            
            <div class="toggle-tabs">
                <button class="tab-btn active" id="login-tab-btn" onclick="switchTab('login')">Log In</button>
                <button class="tab-btn" id="signup-tab-btn" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <div class="form-box active" id="login-form-box">
                <h2 style="font-size: 26px; font-weight: 900; margin-bottom: 20px;">Welcome Back</h2>
                <form id="login-action-form">
                    <div class="auth-input-group">
                        <label>Email Address</label>
                        <input type="email" id="login-email" placeholder="enter your email" required>
                    </div>
                    <div class="auth-input-group">
                        <label>Password</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-black-pill" style="width: 100%; justify-content: center; margin-top: 10px;">Sign In to Workspace →</button>
                </form>
            </div>

            <div class="form-box" id="signup-form-box">
                <h2 style="font-size: 26px; font-weight: 900; margin-bottom: 20px;">Create Account</h2>
                <form id="signup-action-form">
                    <div class="auth-input-group">
                        <label>Full Name</label>
                        <input type="text" id="signup-name" placeholder="Aspirant Name" required>
                    </div>
                    <div class="auth-input-group">
                        <label>Email Address</label>
                        <input type="email" id="signup-email" placeholder="name@domain.com" required>
                    </div>
                    <div class="auth-input-group">
                        <label>Password</label>
                        <input type="password" id="signup-password" placeholder="Create safe password" required>
                    </div>
                    <button type="submit" class="btn-black-pill" style="width: 100%; justify-content: center; margin-top: 10px;">Register Account ✨</button>
                </form>
            </div>

        </div>
    </main>

    <script>
        // Interface Toggle Controller Switching Tabs
        function switchTab(mode) {
    const loginTab = document.getElementById('login-tab-btn');
    const signupTab = document.getElementById('signup-tab-btn');
    const loginForm = document.getElementById('login-form-box');
    const signupForm = document.getElementById('signup-form-box');

    if (mode === 'login') {
        loginTab.classList.add('active');
        signupTab.classList.remove('active');
        loginForm.classList.add('active');
        signupForm.classList.remove('active');
    } else {
        signupTab.classList.add('active');
        loginTab.classList.remove('active');
        signupForm.classList.add('active');
        loginForm.classList.remove('active');
    }
}
    </script>
    <script src="js/main.js"></script>
</body>
</html>
